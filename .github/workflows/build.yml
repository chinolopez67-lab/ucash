name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle and fix wrapper
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle-8.4.zip
          unzip -q gradle-8.4.zip
          ./gradle-8.4/bin/gradle wrapper --gradle-version 8.4 --project-dir mayzter
          chmod +x mayzter/gradlew

      - name: Build Release APK
        run: cd mayzter && ./gradlew assembleRelease
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Find APK
        run: find mayzter -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MAYZTER-LITE
          path: mayzter/app/build/outputs/apk/release/app-release-unsigned.apk
